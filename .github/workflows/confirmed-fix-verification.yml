name: Confirmed Fix Verification

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-confirmed-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Verify backend executable entrypoint
        working-directory: backend
        run: pnpm run verify:backend

      - name: Verify frontend executable entrypoint
        working-directory: frontend
        run: pnpm run verify:frontend

      - name: Verify webhook ingress evidence document checks
        working-directory: backend
        run: pnpm run verify:webhook-ingress:evidence

      - name: Verify sync retry/replay evidence document checks
        working-directory: backend
        run: pnpm run verify:sync-retry-replay:evidence
